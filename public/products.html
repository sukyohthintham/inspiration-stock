<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการสินค้า · Inspiration Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Prompt', sans-serif; background: #f8fafc; } </style>
</head>
<body class="min-h-screen pb-10">
  <main class="max-w-7xl mx-auto px-4 py-6">

    <div class="flex items-center justify-between mb-1">
      <h1 class="text-2xl font-bold text-slate-900">จัดการสินค้า 📦</h1>
      <button onclick="openCreateModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 text-sm">+ เพิ่มสินค้า</button>
    </div>
    <p class="text-sm text-slate-500 mb-6">Master ข้อมูลสินค้าทั้งหมด รหัสจะถูกสร้างอัตโนมัติตามหมวด</p>

    <!-- Filters -->
    <div class="bg-white rounded-2xl p-4 shadow-sm mb-4 flex flex-wrap gap-3 items-center">
      <input id="searchInput" type="text" placeholder="🔍 ค้นหาสินค้า/รหัส..."
        class="flex-1 min-w-[200px] px-4 py-2 border border-slate-200 rounded-lg text-sm">
      <select id="catFilter" class="px-3 py-2 border border-slate-200 rounded-lg text-sm">
        <option value="">ทุกหมวด</option>
      </select>
      <select id="stockFilter" class="px-3 py-2 border border-slate-200 rounded-lg text-sm">
        <option value="">ทุกสถานะ</option>
        <option value="out">หมด</option>
        <option value="low">ใกล้หมด</option>
        <option value="ok">ปกติ</option>
      </select>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-xs text-slate-600">
          <tr>
            <th class="text-left p-3">รูป</th>
            <th class="text-left p-3">รหัส</th>
            <th class="text-left p-3">ชื่อสินค้า</th>
            <th class="text-left p-3">หมวด</th>
            <th class="text-center p-3">หน่วย</th>
            <th class="text-center p-3">คงเหลือ</th>
            <th class="text-center p-3">Min/Max</th>
            <th class="text-right p-3">ต้นทุน</th>
            <th class="p-3"></th>
          </tr>
        </thead>
        <tbody id="prodBody" class="divide-y"></tbody>
      </table>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50" onclick="closeModal()"></div>
    <div class="absolute inset-x-4 top-10 max-w-2xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
      <div class="px-5 py-3 border-b flex items-center justify-between bg-slate-50">
        <div id="mTitle" class="font-bold text-lg">เพิ่ม / แก้ไขสินค้า</div>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-xl">✕</button>
      </div>
      <div class="p-5 overflow-y-auto space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2">
            <label class="block text-xs font-medium text-slate-600 mb-1">ชื่อสินค้า *</label>
            <input id="fName" type="text" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm" required>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">หมวด *</label>
            <select id="fCategory" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm"></select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">หน่วย *</label>
            <input id="fUnit" type="text" placeholder="ชิ้น / ด้าม / กล่อง" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
          </div>
          <div class="col-span-2">
            <label class="block text-xs font-medium text-slate-600 mb-1">รายละเอียด</label>
            <input id="fDesc" type="text" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">จุดสั่งซื้อ (Min)</label>
            <input id="fMin" type="number" min="0" step="0.01" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">สต๊อกสูงสุด (Max)</label>
            <input id="fMax" type="number" min="0" step="0.01" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">ต้นทุน/หน่วย</label>
            <input id="fCost" type="number" min="0" step="0.01" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Supplier หลัก</label>
            <select id="fSupplier" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
              <option value="">- ไม่ระบุ -</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="block text-xs font-medium text-slate-600 mb-1">รูปสินค้า (URL หรืออัปโหลด)</label>
            <input id="fImageUrl" type="text" placeholder="https://..." class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm mb-2">
            <input id="fImageFile" type="file" accept="image/*" class="text-sm">
            <img id="fImagePreview" class="mt-2 max-h-32 rounded-lg border hidden">
          </div>
        </div>
      </div>
      <div class="border-t px-5 py-3 bg-slate-50 flex justify-end gap-2">
        <button onclick="closeModal()" class="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-sm">ยกเลิก</button>
        <button id="saveBtn" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 text-sm font-medium">บันทึก</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
  let me = null;
  let products = [];
  let categories = [];
  let suppliers = [];
  let editingId = null;

  (async () => {
    me = await setupAdminLayout('products');
    if (!me) return;
    await loadCategories();
    await loadSuppliers();
    await loadProducts();
  })();

  async function loadCategories() {
    const { data } = await supabase.from('categories').select('*').order('display_order');
    categories = data || [];
    const opts = categories.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
    document.getElementById('catFilter').innerHTML = '<option value="">ทุกหมวด</option>' + opts;
    document.getElementById('fCategory').innerHTML = opts;
  }
  async function loadSuppliers() {
    const { data } = await supabase.from('suppliers').select('*').eq('is_active', true).order('name');
    suppliers = data || [];
    document.getElementById('fSupplier').innerHTML =
      '<option value="">- ไม่ระบุ -</option>' + suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  }
  async function loadProducts() {
    const { data } = await supabase.from('products')
      .select('*, categories(name, icon, code), suppliers:preferred_supplier_id(name)')
      .order('sku');
    products = data || [];
    renderTable();
  }

  function renderTable() {
    const term = (document.getElementById('searchInput').value || '').toLowerCase();
    const cat = document.getElementById('catFilter').value;
    const st = document.getElementById('stockFilter').value;

    let list = products;
    if (term) list = list.filter(p =>
      p.name.toLowerCase().includes(term) || p.sku.toLowerCase().includes(term)
    );
    if (cat) list = list.filter(p => p.category_id === Number(cat));
    if (st === 'out') list = list.filter(p => Number(p.current_stock) <= 0);
    if (st === 'low') list = list.filter(p => Number(p.current_stock) > 0 && Number(p.current_stock) <= Number(p.min_stock));
    if (st === 'ok')  list = list.filter(p => Number(p.current_stock) > Number(p.min_stock));

    document.getElementById('prodBody').innerHTML = list.map(p => {
      const out = Number(p.current_stock) <= 0;
      const low = !out && Number(p.current_stock) <= Number(p.min_stock);
      return `
        <tr class="hover:bg-slate-50">
          <td class="p-2">
            <div class="w-10 h-10 bg-slate-100 rounded overflow-hidden flex items-center justify-center text-xl">
              ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover">` : '📦'}
            </div>
          </td>
          <td class="p-2"><span class="font-mono text-xs bg-slate-100 px-2 py-1 rounded">${p.sku}</span></td>
          <td class="p-2"><div class="font-medium text-sm">${p.name}</div>${p.description ? `<div class="text-[10px] text-slate-500">${p.description}</div>` : ''}</td>
          <td class="p-2 text-sm">${p.categories?.icon || ''} ${p.categories?.name || '-'}</td>
          <td class="p-2 text-center text-sm">${p.unit}</td>
          <td class="p-2 text-center ${out ? 'text-red-600 font-bold' : low ? 'text-amber-600 font-semibold' : ''}">
            ${Number(p.current_stock)}
            ${out ? '<span class="block text-[10px]">หมด</span>' : low ? '<span class="block text-[10px]">ใกล้หมด</span>' : ''}
          </td>
          <td class="p-2 text-center text-xs text-slate-600">${Number(p.min_stock)}/${Number(p.max_stock)}</td>
          <td class="p-2 text-right text-sm">${fmtCurrency(p.unit_cost)}</td>
          <td class="p-2"><button onclick="openEdit(${p.id})" class="text-blue-600 text-sm hover:underline">แก้ไข</button></td>
        </tr>`;
    }).join('');
  }

  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('catFilter').addEventListener('change', renderTable);
  document.getElementById('stockFilter').addEventListener('change', renderTable);

  function openCreateModal() {
    editingId = null;
    document.getElementById('mTitle').textContent = '+ เพิ่มสินค้าใหม่';
    ['fName','fDesc','fImageUrl'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('fUnit').value = 'ชิ้น';
    document.getElementById('fMin').value = '0';
    document.getElementById('fMax').value = '0';
    document.getElementById('fCost').value = '0';
    document.getElementById('fCategory').value = categories[0]?.id || '';
    document.getElementById('fSupplier').value = '';
    document.getElementById('fImageFile').value = '';
    document.getElementById('fImagePreview').classList.add('hidden');
    document.getElementById('modal').classList.remove('hidden');
  }
  window.openCreateModal = openCreateModal;

  function openEdit(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('mTitle').textContent = '✏️ แก้ไข: ' + p.sku;
    document.getElementById('fName').value = p.name;
    document.getElementById('fDesc').value = p.description || '';
    document.getElementById('fUnit').value = p.unit;
    document.getElementById('fMin').value = p.min_stock;
    document.getElementById('fMax').value = p.max_stock;
    document.getElementById('fCost').value = p.unit_cost;
    document.getElementById('fImageUrl').value = p.image_url || '';
    document.getElementById('fCategory').value = p.category_id || '';
    document.getElementById('fSupplier').value = p.preferred_supplier_id || '';
    if (p.image_url) {
      document.getElementById('fImagePreview').src = p.image_url;
      document.getElementById('fImagePreview').classList.remove('hidden');
    } else {
      document.getElementById('fImagePreview').classList.add('hidden');
    }
    document.getElementById('modal').classList.remove('hidden');
  }
  window.openEdit = openEdit;

  function closeModal() { document.getElementById('modal').classList.add('hidden'); }
  window.closeModal = closeModal;

  document.getElementById('fImageUrl').addEventListener('input', (e) => {
    const url = e.target.value.trim();
    const prev = document.getElementById('fImagePreview');
    if (url) { prev.src = url; prev.classList.remove('hidden'); } else { prev.classList.add('hidden'); }
  });

  async function uploadImage(file) {
    const ext = file.name.split('.').pop();
    const path = `${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
    const { data, error } = await supabase.storage.from('product-images').upload(path, file);
    if (error) throw error;
    const { data: pub } = supabase.storage.from('product-images').getPublicUrl(path);
    return pub.publicUrl;
  }

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const name = document.getElementById('fName').value.trim();
    if (!name) { toast('กรุณาระบุชื่อสินค้า', 'warning'); return; }
    const categoryId = Number(document.getElementById('fCategory').value);

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

    try {
      // Upload image if file selected
      let imageUrl = document.getElementById('fImageUrl').value.trim() || null;
      const file = document.getElementById('fImageFile').files[0];
      if (file) {
        imageUrl = await uploadImage(file);
      }

      const payload = {
        name,
        description: document.getElementById('fDesc').value.trim() || null,
        category_id: categoryId || null,
        unit: document.getElementById('fUnit').value.trim() || 'ชิ้น',
        min_stock: Number(document.getElementById('fMin').value || 0),
        max_stock: Number(document.getElementById('fMax').value || 0),
        unit_cost: Number(document.getElementById('fCost').value || 0),
        preferred_supplier_id: Number(document.getElementById('fSupplier').value) || null,
        image_url: imageUrl,
        updated_at: new Date().toISOString(),
      };

      if (editingId) {
        const { error } = await supabase.from('products').update(payload).eq('id', editingId);
        if (error) throw error;
        toast('แก้ไขเรียบร้อย', 'success');
      } else {
        // Generate SKU
        const cat = categories.find(c => c.id === categoryId);
        const { data: sku } = await supabase.rpc('generate_sku', { cat_code: cat?.code || 'XXX' });
        payload.sku = sku;
        const { error } = await supabase.from('products').insert(payload);
        if (error) throw error;
        toast('เพิ่มสินค้าเรียบร้อย: ' + sku, 'success');
      }
      closeModal();
      await loadProducts();
    } catch (e) {
      toast('ผิดพลาด: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'บันทึก';
    }
  });
  </script>
</body>
</html>
