<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Inspiration Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Prompt', sans-serif; background: #f8fafc; } </style>
</head>
<body class="min-h-screen pb-10">
  <main class="max-w-7xl mx-auto px-4 py-6">

    <h1 class="text-2xl font-bold text-slate-900 mb-1">Dashboard ภาพรวมสต๊อก 📊</h1>
    <p class="text-sm text-slate-500 mb-6">สรุปสถานะการรับ-จ่ายสินค้าทั้งหมด · อัปเดตแบบ realtime</p>

    <!-- KPI Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <div class="text-xs text-slate-500">SKU ทั้งหมด</div>
        <div id="kpiSku" class="text-3xl font-bold text-slate-900 mt-1">-</div>
        <div class="text-xs text-slate-500 mt-1">รายการสินค้า</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <div class="text-xs text-slate-500">มูลค่าสต๊อก</div>
        <div id="kpiValue" class="text-3xl font-bold text-blue-700 mt-1">-</div>
        <div class="text-xs text-slate-500 mt-1">บาท</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <div class="text-xs text-slate-500">รออนุมัติ</div>
        <div id="kpiPending" class="text-3xl font-bold text-amber-600 mt-1">-</div>
        <div class="text-xs text-slate-500 mt-1">ใบเบิก</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <div class="text-xs text-slate-500">ใกล้หมด/หมด</div>
        <div id="kpiLow" class="text-3xl font-bold text-red-600 mt-1">-</div>
        <div class="text-xs text-slate-500 mt-1">รายการ</div>
      </div>
    </div>

    <!-- 2-col layout -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

      <!-- Chart: Movements 14 วัน -->
      <div class="bg-white rounded-2xl p-5 shadow-sm lg:col-span-2">
        <h3 class="font-semibold text-slate-900 mb-3">รับ-จ่าย 14 วันล่าสุด</h3>
        <div class="h-64"><canvas id="movChart"></canvas></div>
      </div>

      <!-- Low Stock -->
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold text-slate-900">⚠️ ใกล้หมด / ควรสั่งซื้อ</h3>
          <span id="lowCount" class="text-xs text-slate-500">-</span>
        </div>
        <div id="lowStockList" class="space-y-2 max-h-80 overflow-y-auto"></div>
      </div>

      <!-- Pending Requisitions -->
      <div class="bg-white rounded-2xl p-5 shadow-sm lg:col-span-2">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold text-slate-900">📥 ใบเบิกรออนุมัติ</h3>
          <a href="approve.html" class="text-xs text-blue-600 hover:underline">ดูทั้งหมด →</a>
        </div>
        <div id="pendingList" class="space-y-2 max-h-80 overflow-y-auto"></div>
      </div>

      <!-- Top Consumed -->
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <h3 class="font-semibold text-slate-900 mb-3">🔥 Top 5 สินค้าใช้บ่อย (30 วัน)</h3>
        <div id="topList" class="space-y-2"></div>
      </div>

    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
  let me = null;
  let movChart = null;

  (async () => {
    me = await setupAdminLayout('dashboard');
    if (!me) return;
    await Promise.all([
      loadKPI(),
      loadMovementChart(),
      loadLowStock(),
      loadPendingReqs(),
      loadTopConsumed(),
    ]);
  })();

  async function loadKPI() {
    // SKU count
    const { count: skuCount } = await supabase.from('products').select('*', { count: 'exact', head: true }).eq('is_active', true);
    document.getElementById('kpiSku').textContent = skuCount ?? 0;

    // Stock value (sum current_stock * unit_cost)
    const { data: vals } = await supabase.from('products').select('current_stock, unit_cost').eq('is_active', true);
    const totalVal = (vals || []).reduce((s, p) => s + (Number(p.current_stock) * Number(p.unit_cost || 0)), 0);
    document.getElementById('kpiValue').textContent = fmtCurrency(totalVal);

    // Pending requisitions
    const { count: pendCount } = await supabase.from('requisitions').select('*', { count: 'exact', head: true }).eq('status', 'pending');
    document.getElementById('kpiPending').textContent = pendCount ?? 0;

    // Low stock count
    const { count: lowCount } = await supabase.from('v_low_stock').select('*', { count: 'exact', head: true });
    document.getElementById('kpiLow').textContent = lowCount ?? 0;
  }

  async function loadMovementChart() {
    const since = new Date(); since.setDate(since.getDate() - 13); since.setHours(0,0,0,0);
    const { data } = await supabase
      .from('stock_movements')
      .select('quantity, movement_type, created_at')
      .gte('created_at', since.toISOString());

    // Group by day
    const days = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      days.push({ date: d, key: d.toISOString().slice(0,10), in: 0, out: 0 });
    }
    (data || []).forEach(m => {
      const key = m.created_at.slice(0, 10);
      const d = days.find(x => x.key === key);
      if (!d) return;
      if (m.movement_type === 'IN') d.in += Number(m.quantity);
      else if (m.movement_type === 'OUT') d.out += Math.abs(Number(m.quantity));
    });

    const ctx = document.getElementById('movChart');
    if (movChart) movChart.destroy();
    movChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: days.map(d => d.date.toLocaleDateString('th-TH', { day:'numeric', month:'short' })),
        datasets: [
          { label: 'รับเข้า', data: days.map(d => d.in),  backgroundColor: 'rgba(34,197,94,0.7)', borderRadius: 6 },
          { label: 'จ่ายออก', data: days.map(d => d.out), backgroundColor: 'rgba(239,68,68,0.7)', borderRadius: 6 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { family: 'Prompt' } } } },
        scales: {
          x: { ticks: { font: { family: 'Prompt' } } },
          y: { beginAtZero: true, ticks: { font: { family: 'Prompt' } } }
        }
      }
    });
  }

  async function loadLowStock() {
    const { data } = await supabase.from('v_low_stock').select('*').order('current_stock').limit(15);
    const el = document.getElementById('lowStockList');
    document.getElementById('lowCount').textContent = `${data?.length || 0} รายการ`;
    if (!data || data.length === 0) {
      el.innerHTML = '<p class="text-sm text-slate-500 text-center py-4">✨ สต๊อกครบทุกรายการ</p>';
      return;
    }
    el.innerHTML = data.map(p => {
      const out = Number(p.current_stock) <= 0;
      return `
        <div class="flex items-center gap-2 p-2 rounded-lg border ${out ? 'bg-red-50 border-red-200' : 'bg-amber-50 border-amber-200'}">
          <span class="text-lg">${p.category_icon || '📦'}</span>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-slate-900 truncate">${p.name}</div>
            <div class="text-xs text-slate-500">${p.sku} · ควรสั่ง ${p.suggested_reorder} ${p.unit}</div>
          </div>
          <div class="text-right">
            <div class="text-sm font-bold ${out ? 'text-red-600' : 'text-amber-600'}">${p.current_stock}</div>
            <div class="text-[10px] text-slate-500">min ${p.min_stock}</div>
          </div>
        </div>`;
    }).join('');
  }

  async function loadPendingReqs() {
    const { data } = await supabase
      .from('requisitions')
      .select('id, req_no, purpose, created_at, total_items, requested_by, profiles!requested_by(full_name, department)')
      .eq('status', 'pending')
      .order('created_at', { ascending: false })
      .limit(10);
    const el = document.getElementById('pendingList');
    if (!data || data.length === 0) {
      el.innerHTML = '<p class="text-sm text-slate-500 text-center py-4">✅ ไม่มีใบรออนุมัติ</p>';
      return;
    }
    el.innerHTML = data.map(r => `
      <a href="approve.html?id=${r.id}" class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 hover:bg-slate-50 transition">
        <div class="bg-amber-100 text-amber-700 px-2 py-1 rounded text-xs font-mono font-semibold">${r.req_no}</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-slate-900 truncate">${r.profiles?.full_name || '-'} ${r.profiles?.department ? '· ' + r.profiles.department : ''}</div>
          <div class="text-xs text-slate-500 truncate">${r.purpose || '<ไม่ระบุวัตถุประสงค์>'}</div>
        </div>
        <div class="text-right">
          <div class="text-sm font-semibold">${r.total_items || 0}</div>
          <div class="text-[10px] text-slate-500">${fmtDate(r.created_at)}</div>
        </div>
      </a>
    `).join('');
  }

  async function loadTopConsumed() {
    const { data } = await supabase.from('v_top_consumed').select('*').limit(5);
    const el = document.getElementById('topList');
    if (!data || data.length === 0) {
      el.innerHTML = '<p class="text-sm text-slate-500 text-center py-4">ยังไม่มีข้อมูลการเบิก</p>';
      return;
    }
    el.innerHTML = data.map((p, i) => `
      <div class="flex items-center gap-2 p-2 rounded-lg bg-slate-50">
        <span class="font-bold text-sm w-5 text-slate-400">#${i+1}</span>
        <div class="w-8 h-8 bg-white rounded overflow-hidden flex items-center justify-center text-lg">
          ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover">` : '📦'}
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium truncate">${p.name}</div>
          <div class="text-[10px] text-slate-500">${p.sku}</div>
        </div>
        <div class="text-sm font-bold">${Number(p.total_consumed)} <span class="text-xs text-slate-500">${p.unit}</span></div>
      </div>
    `).join('');
  }

  // Realtime
  supabase.channel('dashboard-rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'requisitions' }, () => { loadKPI(); loadPendingReqs(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'stock_movements' }, () => { loadKPI(); loadMovementChart(); })
    .subscribe();
  </script>
</body>
</html>
