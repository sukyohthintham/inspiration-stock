<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <title>Inspiration Stock - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Prompt', sans-serif; }
    .gradient-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0c4a6e 100%);
    }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-6xl mb-3">📦</div>
      <h1 class="text-3xl font-bold text-white">Inspiration Stock</h1>
      <p class="text-slate-300 text-sm mt-1">ระบบเบิกสินค้า · อินสไปเรชั่น ดีไซน์</p>
    </div>

    <!-- Card -->
    <div class="bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-7">
      <!-- Tabs -->
      <div class="flex bg-slate-100 rounded-2xl p-1 mb-6">
        <button id="tabLogin"    class="flex-1 py-2.5 rounded-xl font-medium bg-white shadow text-slate-900 transition">เข้าสู่ระบบ</button>
        <button id="tabRegister" class="flex-1 py-2.5 rounded-xl font-medium text-slate-500 transition">สมัครสมาชิก</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">อีเมล</label>
          <input type="email" id="loginEmail" required
            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="you@inspiration.co.th">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">รหัสผ่าน</label>
          <input type="password" id="loginPassword" required
            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="••••••••">
        </div>
        <button type="submit"
          class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold py-3 rounded-xl shadow-lg transition">
          เข้าสู่ระบบ
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="space-y-4 hidden">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">ชื่อ-นามสกุล</label>
          <input type="text" id="regName" required
            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="สมชาย ใจดี">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">แผนก</label>
            <input type="text" id="regDept"
              class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="คลังสินค้า">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">เบอร์โทร</label>
            <input type="tel" id="regPhone"
              class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="08x-xxx-xxxx">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">อีเมล</label>
          <input type="email" id="regEmail" required
            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">รหัสผ่าน (อย่างน้อย 6 ตัว)</label>
          <input type="password" id="regPassword" required minlength="6"
            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit"
          class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold py-3 rounded-xl shadow-lg transition">
          สมัครสมาชิก
        </button>
      </form>

      <div id="formMsg" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <p class="text-center text-slate-400 text-xs mt-6">
      v1.0 · พัฒนาโดย Jarvis สำหรับ พี่หนึ่ง 🎯
    </p>
  </div>

  <script src="js/config.js"></script>
  <script>
    // Tab switching
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const msgEl = document.getElementById('formMsg');

    function showMsg(text, type='error') {
      msgEl.className = `mt-4 text-center text-sm ${type==='error'?'text-red-600':'text-green-600'}`;
      msgEl.textContent = text;
      msgEl.classList.remove('hidden');
    }
    function setTab(which) {
      msgEl.classList.add('hidden');
      if (which === 'login') {
        tabLogin.classList.add('bg-white','shadow','text-slate-900');
        tabLogin.classList.remove('text-slate-500');
        tabRegister.classList.remove('bg-white','shadow','text-slate-900');
        tabRegister.classList.add('text-slate-500');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      } else {
        tabRegister.classList.add('bg-white','shadow','text-slate-900');
        tabRegister.classList.remove('text-slate-500');
        tabLogin.classList.remove('bg-white','shadow','text-slate-900');
        tabLogin.classList.add('text-slate-500');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
      }
    }
    tabLogin.addEventListener('click', () => setTab('login'));
    tabRegister.addEventListener('click', () => setTab('register'));

    // Already logged in? redirect
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        const profile = await getCurrentProfile();
        if (profile && ['admin','manager'].includes(profile.role)) {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'requisition.html';
        }
      }
    })();

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = loginForm.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
      const { error } = await supabase.auth.signInWithPassword({
        email: document.getElementById('loginEmail').value.trim(),
        password: document.getElementById('loginPassword').value,
      });
      if (error) {
        showMsg('เข้าสู่ระบบไม่สำเร็จ: ' + (error.message || ''));
        btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
        return;
      }
      const profile = await getCurrentProfile(true);
      if (profile && ['admin','manager'].includes(profile.role)) {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'requisition.html';
      }
    });

    // Register
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = registerForm.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'กำลังสมัคร...';
      const name = document.getElementById('regName').value.trim();
      const dept = document.getElementById('regDept').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;

      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      if (error) {
        showMsg('สมัครไม่สำเร็จ: ' + (error.message || ''));
        btn.disabled = false; btn.textContent = 'สมัครสมาชิก';
        return;
      }
      // Update extra profile fields
      if (data.user) {
        await supabase.from('profiles')
          .update({ full_name: name, department: dept, phone: phone })
          .eq('id', data.user.id);
      }
      showMsg('สมัครสำเร็จ! กรุณายืนยันอีเมลแล้ว Login อีกครั้ง', 'success');
      btn.disabled = false; btn.textContent = 'สมัครสมาชิก';
      setTimeout(() => setTab('login'), 1500);
    });
  </script>
</body>
</html>
