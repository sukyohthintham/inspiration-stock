<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โอนคลัง · Inspiration Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Prompt', sans-serif; background: #f8fafc; } </style>
</head>
<body class="min-h-screen pb-10">
  <main class="max-w-6xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold text-slate-900 mb-1">โอนระหว่างคลัง 🔄</h1>
    <p class="text-sm text-slate-500 mb-4">Workflow 2 ขั้น: <b>ส่งโอน</b> (หัก source) → <b>ปลายทางกดรับ</b> (เพิ่ม dest)</p>

    <div class="flex gap-2 mb-4 flex-wrap">
      <button data-tab="send" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium border-2 bg-blue-600 text-white border-blue-600">📤 ส่งโอนใหม่</button>
      <button data-tab="receive" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium border-2 bg-white text-slate-700 border-slate-200">
        📥 รอรับ <span id="cntPending" class="ml-1 px-1.5 py-0.5 bg-amber-100 text-amber-700 rounded text-xs">0</span>
      </button>
      <button data-tab="history" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium border-2 bg-white text-slate-700 border-slate-200">📜 ประวัติ</button>
    </div>

    <!-- TAB: SEND -->
    <section id="tabSend">
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <h3 class="font-semibold text-slate-900 mb-3">สร้างใบโอนใหม่</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">🏢 จากคลัง (ต้นทาง) *</label>
            <select id="fromSel" class="w-full px-3 py-2 border-2 border-amber-300 rounded-lg text-sm font-semibold bg-amber-50">
              <option value="">- เลือก -</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">🏢 ไปคลัง (ปลายทาง) *</label>
            <select id="toSel" class="w-full px-3 py-2 border-2 border-green-300 rounded-lg text-sm font-semibold bg-green-50">
              <option value="">- เลือก -</option>
            </select>
          </div>
        </div>

        <div id="needSelection" class="text-center text-slate-500 py-10 border border-dashed rounded-xl">
          <div class="text-3xl mb-2">🏢 → 🏢</div>
          <div class="text-sm">กรุณาเลือกคลังต้นทางและปลายทาง</div>
        </div>

        <div id="transferUI" class="hidden">
          <div class="border border-dashed rounded-xl p-3 mb-3 bg-slate-50">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-2">
              <div class="md:col-span-7">
                <label class="block text-[10px] font-medium text-slate-600 mb-1">สินค้า</label>
                <select id="prodSel" class="w-full px-2 py-2 border border-slate-200 rounded-lg text-sm">
                  <option value="">- เลือกสินค้า -</option>
                </select>
              </div>
              <div class="md:col-span-2">
                <label class="block text-[10px] font-medium text-slate-600 mb-1">จำนวน</label>
                <input id="qtyInput" type="number" min="0" step="0.01" placeholder="0" class="w-full px-2 py-2 border border-slate-200 rounded-lg text-sm">
              </div>
              <div class="md:col-span-3 flex items-end">
                <button id="addLineBtn" class="w-full px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow">+ เพิ่มเข้าตะกร้า</button>
              </div>
            </div>
            <div id="prodInfo" class="text-xs text-slate-500 mt-2"></div>
          </div>

          <div class="border rounded-xl overflow-hidden mb-3">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-xs text-slate-600">
                <tr>
                  <th class="text-left p-2">สินค้า</th>
                  <th class="text-center p-2 w-20">มี</th>
                  <th class="text-center p-2 w-20">โอน</th>
                  <th class="text-center p-2 w-20">เหลือ</th>
                  <th class="w-10"></th>
                </tr>
              </thead>
              <tbody id="linesBody" class="divide-y"></tbody>
            </table>
          </div>

          <textarea id="trfNotes" placeholder="หมายเหตุ (ถ้ามี)..." rows="2" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm mb-3"></textarea>

          <button id="saveTrfBtn" class="w-full bg-gradient-to-r from-purple-600 to-purple-700 text-white font-semibold py-3 rounded-xl shadow-lg">
            📤 ส่งโอน (รอปลายทางกดรับ)
          </button>
        </div>
      </div>
    </section>

    <!-- TAB: RECEIVE -->
    <section id="tabReceive" class="hidden">
      <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="p-4 border-b">
          <h3 class="font-semibold text-slate-900">📥 ใบโอนที่รอคุณรับ</h3>
          <p class="text-xs text-slate-500">แสดงเฉพาะใบที่ปลายทางเป็นคลังที่คุณดูแล</p>
        </div>
        <div id="pendingList" class="divide-y"></div>
      </div>
    </section>

    <!-- TAB: HISTORY -->
    <section id="tabHistory" class="hidden">
      <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="p-4 border-b flex justify-between items-center">
          <h3 class="font-semibold text-slate-900">📜 ประวัติการโอนทั้งหมด</h3>
          <select id="histFilter" class="px-3 py-1.5 border border-slate-200 rounded-lg text-xs">
            <option value="">ทุกสถานะ</option>
            <option value="in_transit">กำลังเดินทาง</option>
            <option value="received">รับแล้ว</option>
            <option value="rejected">ปฏิเสธ</option>
          </select>
        </div>
        <div id="historyList" class="divide-y"></div>
      </div>
    </section>
  </main>

  <!-- DETAIL MODAL -->
  <div id="detailModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50" onclick="closeDetailModal()"></div>
    <div class="absolute inset-x-4 top-10 bottom-10 max-w-2xl mx-auto bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden">
      <div class="px-5 py-3 border-b flex items-center justify-between bg-slate-50">
        <div>
          <div id="dmTitle" class="font-bold text-lg">-</div>
          <div id="dmMeta" class="text-xs text-slate-500">-</div>
        </div>
        <button onclick="closeDetailModal()" class="text-slate-400 hover:text-slate-700 text-xl">✕</button>
      </div>
      <div id="dmBody" class="flex-1 overflow-y-auto p-5">-</div>
      <div id="dmActions" class="border-t p-4 bg-slate-50 flex gap-2 justify-end"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
  let me = null;
  let allProducts = [];
  let manageLocations = [];
  let allLocations = [];
  let stocksAtFrom = {};
  let lines = [];
  let activeTab = 'send';
  let currentDetailTrf = null;

  (async () => {
    me = await setupAdminLayout('transfer');
    if (!me) return;
    setupTabs();
    await loadLocations();
    await loadProducts();
    await loadPending();
    await loadHistory();
  })();

  function setupTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.remove('bg-blue-600','text-white','border-blue-600');
          b.classList.add('bg-white','text-slate-700','border-slate-200');
        });
        btn.classList.remove('bg-white','text-slate-700','border-slate-200');
        btn.classList.add('bg-blue-600','text-white','border-blue-600');
        document.getElementById('tabSend').classList.toggle('hidden', activeTab !== 'send');
        document.getElementById('tabReceive').classList.toggle('hidden', activeTab !== 'receive');
        document.getElementById('tabHistory').classList.toggle('hidden', activeTab !== 'history');
      });
    });
    document.getElementById('histFilter').addEventListener('change', loadHistory);
  }

  async function loadLocations() {
    const { data: allLoc } = await supabase.from('locations').select('*').eq('is_active', true).order('display_order');
    allLocations = allLoc || [];
    const { data: mappings } = await supabase.from('user_locations').select('location_id, can_manage').eq('user_id', me.id);
    if (!mappings || mappings.length === 0) {
      manageLocations = allLocations;
    } else {
      const ids = mappings.filter(m => m.can_manage).map(m => m.location_id);
      manageLocations = allLocations.filter(l => ids.includes(l.id));
    }
    const opts = allLocations.map(l => '<option value="' + l.id + '">🏢 ' + l.name + ' (' + l.code + ')</option>').join('');
    document.getElementById('fromSel').innerHTML = '<option value="">- เลือก -</option>' + manageLocations.map(l => '<option value="' + l.id + '">🏢 ' + l.name + ' (' + l.code + ')</option>').join('');
    document.getElementById('toSel').innerHTML = '<option value="">- เลือก -</option>' + opts;
  }

  async function loadProducts() {
    const { data } = await supabase.from('products').select('id, sku, name, unit, unit_cost').eq('is_active', true).order('name');
    allProducts = data || [];
  }

  async function onLocationChange() {
    const fromId = Number(document.getElementById('fromSel').value);
    const toId = Number(document.getElementById('toSel').value);
    if (!fromId || !toId) {
      document.getElementById('needSelection').classList.remove('hidden');
      document.getElementById('transferUI').classList.add('hidden'); return;
    }
    if (fromId === toId) {
      toast('คลังต้นทางและปลายทางต้องไม่ใช่ที่เดียวกัน', 'warning');
      document.getElementById('toSel').value = ''; return;
    }
    const { data: stocks } = await supabase.from('product_stocks')
      .select('product_id, current_stock, products(id, sku, name, unit)')
      .eq('location_id', fromId).gt('current_stock', 0);
    stocksAtFrom = {};
    (stocks || []).forEach(s => {
      stocksAtFrom[s.product_id] = { qty: Number(s.current_stock), name: s.products?.name, sku: s.products?.sku, unit: s.products?.unit };
    });
    const opts = Object.entries(stocksAtFrom).map(([pid, info]) =>
      '<option value="' + pid + '">' + info.sku + ' · ' + info.name + ' (มี ' + info.qty + ' ' + info.unit + ')</option>'
    ).join('');
    document.getElementById('prodSel').innerHTML = '<option value="">- เลือกสินค้า -</option>' + opts;
    document.getElementById('needSelection').classList.add('hidden');
    document.getElementById('transferUI').classList.remove('hidden');
    lines = []; renderLines();
  }

  document.getElementById('fromSel').addEventListener('change', onLocationChange);
  document.getElementById('toSel').addEventListener('change', onLocationChange);
  document.getElementById('prodSel').addEventListener('change', (e) => {
    const pid = Number(e.target.value);
    const info = stocksAtFrom[pid];
    document.getElementById('prodInfo').textContent = info ? 'มีในคลังต้นทาง: ' + info.qty + ' ' + info.unit : '';
  });
  document.getElementById('qtyInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('addLineBtn').click(); }
  });

  document.getElementById('addLineBtn').addEventListener('click', () => {
    const pid = Number(document.getElementById('prodSel').value);
    const qty = Number(document.getElementById('qtyInput').value);
    if (!pid || qty <= 0) { toast('ระบุสินค้าและจำนวน', 'warning'); return; }
    const info = stocksAtFrom[pid]; if (!info) return;
    const inCart = lines.find(l => l.product_id === pid)?.qty || 0;
    if (inCart + qty > info.qty) {
      toast('เกินจำนวนที่มี (มี ' + info.qty + ' · เพิ่มได้อีก ' + (info.qty - inCart) + ')', 'warning'); return;
    }
    const ex = lines.find(l => l.product_id === pid);
    if (ex) ex.qty += qty;
    else lines.push({ product_id: pid, ...info, qty });
    ['prodSel','qtyInput','prodInfo'].forEach(i => { const el = document.getElementById(i); if (el.tagName === 'DIV') el.textContent = ''; else el.value = ''; });
    renderLines();
  });

  function renderLines() {
    const tb = document.getElementById('linesBody');
    if (lines.length === 0) {
      tb.innerHTML = '<tr><td colspan="5" class="text-center text-slate-400 p-4">ยังไม่มีรายการ</td></tr>'; return;
    }
    tb.innerHTML = lines.map((l, idx) => {
      const remaining = stocksAtFrom[l.product_id].qty - l.qty;
      return '<tr>' +
        '<td class="p-2"><div class="font-medium text-sm">' + l.name + '</div><div class="text-[11px] text-slate-500">' + l.sku + ' · ' + l.unit + '</div></td>' +
        '<td class="text-center p-2 text-slate-600">' + stocksAtFrom[l.product_id].qty + '</td>' +
        '<td class="text-center p-2 font-bold text-purple-700">' + l.qty + '</td>' +
        '<td class="text-center p-2 ' + (remaining === 0 ? 'text-red-600 font-bold' : 'text-slate-600') + '">' + remaining + '</td>' +
        '<td class="p-2"><button onclick="removeLine(' + idx + ')" class="text-red-500 hover:text-red-700 text-sm">✕</button></td></tr>';
    }).join('');
  }
  function removeLine(idx) { lines.splice(idx, 1); renderLines(); }
  window.removeLine = removeLine;

  document.getElementById('saveTrfBtn').addEventListener('click', async () => {
    const fromId = Number(document.getElementById('fromSel').value);
    const toId = Number(document.getElementById('toSel').value);
    if (!fromId || !toId) { toast('เลือกคลังให้ครบ', 'warning'); return; }
    const pPid = Number(document.getElementById('prodSel').value);
    const pQty = Number(document.getElementById('qtyInput').value);
    if (pPid && pQty > 0) document.getElementById('addLineBtn').click();
    if (lines.length === 0) { toast('กรุณาเลือกสินค้าและจำนวนก่อน', 'warning'); return; }
    const fromName = manageLocations.find(l => l.id === fromId)?.name || '';
    const toName = allLocations.find(l => l.id === toId)?.name || '';
    if (!confirmDialog('📤 ส่งโอน ' + lines.length + ' รายการ\nจาก "' + fromName + '" → "' + toName + '"\n\n(stock จะถูกหักจากต้นทางทันที · ปลายทางต้องกดรับเพื่อเพิ่มเข้า)')) return;

    const btn = document.getElementById('saveTrfBtn');
    btn.disabled = true; btn.textContent = 'กำลังส่ง...';
    try {
      const items = lines.map(l => ({ product_id: l.product_id, quantity: l.qty }));
      const { error } = await supabase.rpc('send_transfer', {
        p_from_location: fromId, p_to_location: toId, p_items: items,
        p_user_id: me.id, p_notes: document.getElementById('trfNotes').value.trim() || null,
      });
      if (error) throw error;
      toast('ส่งโอนเรียบร้อย · รอปลายทางกดรับ', 'success');
      lines = []; renderLines();
      ['fromSel','toSel','trfNotes'].forEach(i => document.getElementById(i).value = '');
      onLocationChange();
      await loadPending(); await loadHistory();
    } catch (e) { toast('ผิดพลาด: ' + e.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = '📤 ส่งโอน (รอปลายทางกดรับ)'; }
  });

  // ============ RECEIVE TAB ============
  async function loadPending() {
    const manageIds = manageLocations.map(l => l.id);
    if (manageIds.length === 0) {
      document.getElementById('pendingList').innerHTML = '<p class="text-center text-slate-500 p-6">ไม่มีคลังที่ดูแล</p>';
      document.getElementById('cntPending').textContent = '0';
      return;
    }
    const { data } = await supabase.from('transfers')
      .select('*, from_loc:from_location_id(name, code), to_loc:to_location_id(name, code), sender:sent_by(full_name), transfer_items(id, quantity, products(sku, name, unit))')
      .eq('status', 'in_transit')
      .in('to_location_id', manageIds)
      .order('sent_at', { ascending: false });

    document.getElementById('cntPending').textContent = (data || []).length;
    const el = document.getElementById('pendingList');
    if (!data || data.length === 0) {
      el.innerHTML = '<p class="text-center text-slate-500 p-6">ไม่มีใบโอนที่รอรับ</p>';
      return;
    }
    el.innerHTML = data.map(t => {
      const items = (t.transfer_items || []).map(i => i.products?.name + ' × ' + i.quantity).join(', ');
      return '<button onclick="openDetail(' + t.id + ')" class="w-full p-4 hover:bg-slate-50 text-left transition">' +
        '<div class="flex items-center gap-2 mb-1 flex-wrap">' +
          '<div class="font-mono font-bold">' + t.transfer_no + '</div>' +
          '<span class="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700">🚚 กำลังเดินทาง</span>' +
        '</div>' +
        '<div class="text-xs flex items-center gap-1 flex-wrap mb-1">' +
          '<span class="px-1.5 py-0.5 bg-amber-100 text-amber-700 rounded text-[10px]">🏢 ' + (t.from_loc?.name || '-') + '</span>' +
          '<span class="text-slate-400">→</span>' +
          '<span class="px-1.5 py-0.5 bg-green-100 text-green-700 rounded text-[10px]">🏢 ' + (t.to_loc?.name || '-') + '</span>' +
          '<span class="text-slate-400 ml-2">' + fmtDate(t.sent_at) + ' · โดย ' + (t.sender?.full_name || '-') + '</span>' +
        '</div>' +
        '<div class="text-xs text-slate-600 line-clamp-2">' + items + '</div>' +
      '</button>';
    }).join('');
  }

  // ============ HISTORY TAB ============
  async function loadHistory() {
    const stf = document.getElementById('histFilter').value;
    let q = supabase.from('transfers')
      .select('*, from_loc:from_location_id(name, code), to_loc:to_location_id(name, code), sender:sent_by(full_name), receiver:received_by(full_name), transfer_items(id, quantity, products(sku, name, unit))')
      .order('sent_at', { ascending: false }).limit(100);
    if (stf) q = q.eq('status', stf);
    const { data } = await q;
    const el = document.getElementById('historyList');
    if (!data || data.length === 0) {
      el.innerHTML = '<p class="text-center text-slate-500 p-6">ไม่มีประวัติ</p>'; return;
    }
    const sb = {
      in_transit: { c: 'bg-amber-100 text-amber-700', t: '🚚 กำลังเดินทาง' },
      received: { c: 'bg-green-100 text-green-700', t: '✅ รับแล้ว' },
      rejected: { c: 'bg-red-100 text-red-700', t: '❌ ปฏิเสธ' },
      cancelled: { c: 'bg-slate-100 text-slate-600', t: '⛔ ยกเลิก' },
    };
    el.innerHTML = data.map(t => {
      const s = sb[t.status] || { c: 'bg-slate-100', t: t.status };
      const items = (t.transfer_items || []).map(i => i.products?.name + ' × ' + i.quantity).join(', ');
      return '<button onclick="openDetail(' + t.id + ')" class="w-full p-4 hover:bg-slate-50 text-left transition">' +
        '<div class="flex items-center gap-2 mb-1 flex-wrap">' +
          '<div class="font-mono font-bold">' + t.transfer_no + '</div>' +
          '<span class="text-xs px-2 py-0.5 rounded-full ' + s.c + '">' + s.t + '</span>' +
        '</div>' +
        '<div class="text-xs flex items-center gap-1 flex-wrap mb-1">' +
          '<span class="px-1.5 py-0.5 bg-amber-50 text-amber-700 rounded text-[10px]">🏢 ' + (t.from_loc?.name || '-') + '</span>' +
          '<span class="text-slate-400">→</span>' +
          '<span class="px-1.5 py-0.5 bg-green-50 text-green-700 rounded text-[10px]">🏢 ' + (t.to_loc?.name || '-') + '</span>' +
          '<span class="text-slate-400 ml-2">' + fmtDate(t.sent_at) + '</span>' +
        '</div>' +
        '<div class="text-xs text-slate-600 line-clamp-1">' + items + '</div>' +
      '</button>';
    }).join('');
  }

  // ============ DETAIL MODAL ============
  async function openDetail(trfId) {
    const { data: t } = await supabase.from('transfers')
      .select('*, from_loc:from_location_id(name, code), to_loc:to_location_id(name, code), sender:sent_by(full_name), receiver:received_by(full_name), transfer_items(*, products(sku, name, unit))')
      .eq('id', trfId).single();
    if (!t) { toast('ไม่พบใบโอน', 'error'); return; }
    currentDetailTrf = t;

    const sb = {
      in_transit: { c: 'bg-amber-100 text-amber-700', t: '🚚 กำลังเดินทาง' },
      received: { c: 'bg-green-100 text-green-700', t: '✅ รับแล้ว' },
      rejected: { c: 'bg-red-100 text-red-700', t: '❌ ปฏิเสธ' },
    }[t.status] || { c: 'bg-slate-100', t: t.status };

    document.getElementById('dmTitle').textContent = t.transfer_no;
    document.getElementById('dmMeta').innerHTML =
      'จาก <b>🏢 ' + t.from_loc.name + '</b> → ปลายทาง <b>🏢 ' + t.to_loc.name + '</b> · ' +
      '<span class="px-2 py-0.5 rounded ' + sb.c + '">' + sb.t + '</span>';

    let body = '<div class="space-y-3">';
    body += '<div class="grid grid-cols-2 gap-3 text-sm">' +
      '<div class="bg-slate-50 p-3 rounded-lg"><div class="text-[10px] text-slate-500">ส่งโดย</div><div class="font-medium">' + (t.sender?.full_name || '-') + '</div><div class="text-[10px] text-slate-500">' + fmtDate(t.sent_at) + '</div></div>' +
      '<div class="bg-slate-50 p-3 rounded-lg"><div class="text-[10px] text-slate-500">รับโดย</div><div class="font-medium">' + (t.receiver?.full_name || '-') + '</div><div class="text-[10px] text-slate-500">' + (t.received_at ? fmtDate(t.received_at) : '-') + '</div></div>' +
    '</div>';

    if (t.notes) body += '<div class="bg-slate-50 p-3 rounded-lg text-sm"><span class="text-slate-500">หมายเหตุ:</span> ' + t.notes + '</div>';
    if (t.rejection_reason) body += '<div class="bg-red-50 p-3 rounded-lg text-sm text-red-700">เหตุผลปฏิเสธ: ' + t.rejection_reason + '</div>';

    body += '<div class="border rounded-xl overflow-hidden"><table class="w-full text-sm">' +
      '<thead class="bg-slate-50 text-xs"><tr>' +
        '<th class="text-left p-2">สินค้า</th>' +
        '<th class="text-center p-2">จำนวน</th>' +
      '</tr></thead><tbody class="divide-y">' +
      (t.transfer_items || []).map(it => '<tr>' +
        '<td class="p-2"><div class="font-medium">' + it.products?.name + '</div><div class="text-[10px] text-slate-500">' + it.products?.sku + '</div></td>' +
        '<td class="p-2 text-center font-bold text-purple-700">' + it.quantity + ' ' + (it.products?.unit || '') + '</td></tr>'
      ).join('') + '</tbody></table></div>';
    body += '</div>';
    document.getElementById('dmBody').innerHTML = body;

    const actions = document.getElementById('dmActions');
    const canReceive = t.status === 'in_transit' && manageLocations.some(l => l.id === t.to_location_id);
    if (canReceive) {
      actions.innerHTML =
        '<button onclick="rejectTransfer()" class="px-4 py-2 rounded-lg bg-red-100 text-red-700 hover:bg-red-200 font-medium">❌ ปฏิเสธ</button>' +
        '<button onclick="confirmReceive()" class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-700 font-medium">✅ รับเข้า</button>';
    } else {
      actions.innerHTML = '<button onclick="closeDetailModal()" class="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200">ปิด</button>';
    }
    document.getElementById('detailModal').classList.remove('hidden');
  }
  window.openDetail = openDetail;

  function closeDetailModal() {
    document.getElementById('detailModal').classList.add('hidden');
    currentDetailTrf = null;
  }
  window.closeDetailModal = closeDetailModal;

  async function confirmReceive() {
    if (!currentDetailTrf) return;
    if (!confirmDialog('✅ ยืนยันรับใบโอน ' + currentDetailTrf.transfer_no + '?\nstock จะถูกเพิ่มที่ ' + currentDetailTrf.to_loc.name)) return;
    const { error } = await supabase.rpc('receive_transfer', { p_transfer_id: currentDetailTrf.id, p_user_id: me.id });
    if (error) { toast('ผิดพลาด: ' + error.message, 'error'); return; }
    toast('รับโอนเรียบร้อย ✅', 'success');
    closeDetailModal(); await loadPending(); await loadHistory();
  }
  window.confirmReceive = confirmReceive;

  async function rejectTransfer() {
    if (!currentDetailTrf) return;
    const reason = prompt('เหตุผลที่ปฏิเสธ?');
    if (reason === null) return;
    const { error } = await supabase.rpc('reject_transfer', { p_transfer_id: currentDetailTrf.id, p_user_id: me.id, p_reason: reason || 'ไม่ระบุ' });
    if (error) { toast('ผิดพลาด: ' + error.message, 'error'); return; }
    toast('ปฏิเสธแล้ว · stock คืนกลับต้นทาง', 'warning');
    closeDetailModal(); await loadPending(); await loadHistory();
  }
  window.rejectTransfer = rejectTransfer;

  renderLines();
  supabase.channel('transfers-rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'transfers' }, () => { loadPending(); loadHistory(); })
    .subscribe();
  </script>
</body>
</html>
