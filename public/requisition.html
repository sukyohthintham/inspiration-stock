<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <title>เบิกสินค้า · Inspiration Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Prompt', sans-serif; background: #f1f5f9; }
    .card { background: white; border-radius: 16px; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen pb-32">

  <!-- TOP BAR -->
  <header class="sticky top-0 z-30 bg-white shadow-sm">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
      <div class="text-2xl">📦</div>
      <div class="flex-1">
        <h1 class="font-bold text-slate-900 leading-tight">เบิกสินค้า</h1>
        <p id="userName" class="text-xs text-slate-500">กำลังโหลด...</p>
      </div>
      <button id="historyBtn" class="p-2 hover:bg-slate-100 rounded-full" title="ประวัติการเบิก">
        <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </button>
      <button id="adminBtn" class="p-2 hover:bg-slate-100 rounded-full hidden" title="Admin">
        <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
      <button onclick="logout()" class="p-2 hover:bg-slate-100 rounded-full" title="ออกจากระบบ">
        <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </button>
    </div>

    <!-- Search -->
    <div class="max-w-2xl mx-auto px-4 pb-3">
      <div class="relative">
        <input id="searchInput" type="text" placeholder="ค้นหาสินค้า รหัส หรือชื่อ..."
          class="w-full bg-slate-100 px-4 py-2.5 pl-11 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <svg class="absolute left-3.5 top-3 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
      </div>
    </div>

    <!-- Category Chips -->
    <div id="categoryChips" class="max-w-2xl mx-auto px-4 pb-3 flex gap-2 overflow-x-auto no-scrollbar"></div>
  </header>

  <main class="max-w-2xl mx-auto p-4">

    <!-- Frequent Items -->
    <section id="frequentSection" class="hidden mb-6">
      <h2 class="text-sm font-semibold text-slate-700 mb-3 flex items-center gap-2">
        <span>⚡ ใช้บ่อย</span>
        <span class="text-xs font-normal text-slate-500">แตะเพื่อเพิ่ม +1</span>
      </h2>
      <div id="frequentList" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
    </section>

    <!-- All Products -->
    <section>
      <h2 class="text-sm font-semibold text-slate-700 mb-3">📋 สินค้าทั้งหมด</h2>
      <div id="productList" class="space-y-3"></div>
      <div id="emptyState" class="hidden text-center text-slate-500 py-10">ไม่พบสินค้า</div>
    </section>
  </main>

  <!-- CART FAB + BOTTOM SHEET -->
  <button id="cartBtn"
    class="fixed bottom-6 right-6 z-40 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-full shadow-2xl flex items-center gap-2 px-5 py-3.5 font-semibold hidden">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
    </svg>
    <span id="cartLabel">ตะกร้า (0)</span>
  </button>

  <!-- Cart Bottom Sheet -->
  <div id="cartSheet" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50" onclick="closeCart()"></div>
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl max-h-[85vh] flex flex-col">
      <div class="px-5 pt-3 pb-2">
        <div class="mx-auto w-12 h-1.5 bg-slate-300 rounded-full"></div>
      </div>
      <div class="px-5 pb-3 flex items-center justify-between">
        <h3 class="font-bold text-lg">ตะกร้าใบเบิก</h3>
        <button onclick="closeCart()" class="text-slate-500">✕</button>
      </div>
      <div id="cartItems" class="flex-1 overflow-y-auto px-5 pb-3 space-y-3"></div>
      <div class="border-t p-5 space-y-3">
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">วัตถุประสงค์การเบิก</label>
          <input id="cartPurpose" type="text" placeholder="เช่น ใช้ในออฟฟิศประจำเดือน"
            class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div class="flex items-center justify-between text-sm">
          <span class="text-slate-600">จำนวนรายการ</span>
          <span id="cartTotalItems" class="font-bold">0 รายการ</span>
        </div>
        <button id="submitReqBtn" disabled
          class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white font-semibold py-3 rounded-xl shadow-lg disabled:opacity-50">
          ส่งใบเบิก
        </button>
      </div>
    </div>
  </div>

  <!-- History Sheet -->
  <div id="historySheet" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50" onclick="closeHistory()"></div>
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl max-h-[85vh] flex flex-col">
      <div class="px-5 pt-3 pb-2">
        <div class="mx-auto w-12 h-1.5 bg-slate-300 rounded-full"></div>
      </div>
      <div class="px-5 pb-3 flex items-center justify-between">
        <h3 class="font-bold text-lg">ประวัติการเบิก</h3>
        <button onclick="closeHistory()" class="text-slate-500">✕</button>
      </div>
      <div id="historyList" class="flex-1 overflow-y-auto px-5 pb-6 space-y-3"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
  let me = null;
  let categories = [];
  let products = [];
  let activeCategory = null;
  const cart = new Map(); // product_id -> { product, qty }

  // ====== INIT ======
  (async () => {
    me = await requireAuth();
    if (!me) return;
    document.getElementById('userName').textContent = `${me.full_name}${me.department ? ' · ' + me.department : ''}`;
    if (['admin','manager'].includes(me.role)) {
      document.getElementById('adminBtn').classList.remove('hidden');
      document.getElementById('adminBtn').addEventListener('click', () => location.href='dashboard.html');
    }
    await loadCategories();
    await loadProducts();
    renderCategoryChips();
    renderProducts();
    renderFrequent();
  })();

  // ====== LOAD DATA ======
  async function loadCategories() {
    const { data } = await supabase.from('categories').select('*').eq('is_active', true).order('display_order');
    categories = data || [];
  }

  async function loadProducts() {
    const { data } = await supabase
      .from('products')
      .select('id, sku, name, description, unit, image_url, current_stock, min_stock, is_frequent, category_id')
      .eq('is_active', true)
      .order('name');
    products = data || [];
  }

  // ====== RENDER ======
  function renderCategoryChips() {
    const el = document.getElementById('categoryChips');
    const chips = [
      { id: null, name: 'ทั้งหมด', icon: '🗂️' },
      ...categories
    ];
    el.innerHTML = chips.map(c => `
      <button data-cat="${c.id ?? ''}"
        class="cat-chip whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium border transition ${activeCategory===c.id ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-200'}">
        ${c.icon || ''} ${c.name}
      </button>`).join('');
    el.querySelectorAll('.cat-chip').forEach(b => b.addEventListener('click', () => {
      const v = b.getAttribute('data-cat');
      activeCategory = v === '' ? null : Number(v);
      renderCategoryChips();
      renderProducts();
    }));
  }

  function renderFrequent() {
    const freq = products.filter(p => p.is_frequent).slice(0, 6);
    const sec = document.getElementById('frequentSection');
    if (freq.length === 0) { sec.classList.add('hidden'); return; }
    sec.classList.remove('hidden');
    document.getElementById('frequentList').innerHTML = freq.map(p => `
      <button onclick="quickAdd(${p.id})"
        class="card p-3 text-left hover:shadow-md transition fade-in">
        <div class="aspect-square bg-slate-100 rounded-xl mb-2 overflow-hidden flex items-center justify-center text-3xl">
          ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover">` : '📦'}
        </div>
        <div class="text-xs font-medium text-slate-900 line-clamp-2">${p.name}</div>
        <div class="text-[11px] text-slate-500 mt-1">${p.sku} · คงเหลือ ${Number(p.current_stock)}</div>
      </button>`).join('');
  }

  function renderProducts() {
    const term = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    let list = products;
    if (activeCategory) list = list.filter(p => p.category_id === activeCategory);
    if (term) list = list.filter(p =>
      (p.name||'').toLowerCase().includes(term) ||
      (p.sku||'').toLowerCase().includes(term) ||
      (p.description||'').toLowerCase().includes(term)
    );

    const el = document.getElementById('productList');
    document.getElementById('emptyState').classList.toggle('hidden', list.length > 0);

    el.innerHTML = list.map(p => {
      const low = Number(p.current_stock) <= Number(p.min_stock);
      const out = Number(p.current_stock) <= 0;
      const inCart = cart.get(p.id);
      return `
        <div class="card p-3 flex gap-3 items-center fade-in">
          <div class="w-16 h-16 bg-slate-100 rounded-xl overflow-hidden flex items-center justify-center text-3xl flex-shrink-0">
            ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover">` : '📦'}
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-medium text-slate-900 text-sm line-clamp-1">${p.name}</div>
            <div class="text-xs text-slate-500">${p.sku} · ต่อ${p.unit}</div>
            <div class="text-xs mt-1 flex items-center gap-2">
              <span class="${out ? 'text-red-600 font-bold' : low ? 'text-amber-600 font-semibold' : 'text-slate-600'}">
                คงเหลือ ${Number(p.current_stock)} ${p.unit}
              </span>
              ${out ? '<span class="text-[10px] bg-red-100 text-red-700 px-1.5 py-0.5 rounded">หมด</span>' : ''}
              ${!out && low ? '<span class="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded">ใกล้หมด</span>' : ''}
            </div>
          </div>
          <div class="flex items-center gap-1">
            ${inCart ? `
              <button onclick="changeQty(${p.id}, -1)" class="w-9 h-9 rounded-full bg-slate-100 text-slate-700 font-bold">-</button>
              <span class="w-8 text-center font-bold">${inCart.qty}</span>
              <button onclick="changeQty(${p.id}, 1)" class="w-9 h-9 rounded-full bg-blue-600 text-white font-bold" ${inCart.qty >= p.current_stock ? 'disabled' : ''}>+</button>
            ` : `
              <button onclick="quickAdd(${p.id})" ${out ? 'disabled' : ''} class="w-9 h-9 rounded-full bg-blue-600 text-white font-bold shadow disabled:opacity-30">+</button>
            `}
          </div>
        </div>`;
    }).join('');
  }

  // ====== CART ======
  function quickAdd(productId) {
    const p = products.find(x => x.id === productId);
    if (!p) return;
    if (p.current_stock <= 0) { toast('สินค้าหมดสต๊อก', 'error'); return; }
    const cur = cart.get(productId);
    if (cur) {
      if (cur.qty < p.current_stock) cur.qty += 1;
      else { toast('เกินจำนวนคงเหลือ', 'warning'); return; }
    } else {
      cart.set(productId, { product: p, qty: 1 });
    }
    refreshCart();
    renderProducts();
  }

  function changeQty(productId, delta) {
    const cur = cart.get(productId);
    if (!cur) return;
    const newQty = cur.qty + delta;
    if (newQty <= 0) cart.delete(productId);
    else if (newQty > cur.product.current_stock) { toast('เกินจำนวนคงเหลือ', 'warning'); return; }
    else cur.qty = newQty;
    refreshCart();
    renderProducts();
  }

  function refreshCart() {
    const count = cart.size;
    const totalQty = Array.from(cart.values()).reduce((s, x) => s + x.qty, 0);
    const btn = document.getElementById('cartBtn');
    const label = document.getElementById('cartLabel');
    if (count > 0) {
      btn.classList.remove('hidden');
      label.textContent = `ตะกร้า (${count} รายการ · ${totalQty} ชิ้น)`;
    } else {
      btn.classList.add('hidden');
      closeCart();
    }
    // update cart sheet
    const items = document.getElementById('cartItems');
    if (count === 0) {
      items.innerHTML = '<p class="text-center text-slate-500 py-8">ยังไม่มีสินค้าในตะกร้า</p>';
    } else {
      items.innerHTML = Array.from(cart.values()).map(({ product: p, qty }) => `
        <div class="flex items-center gap-3 fade-in">
          <div class="w-12 h-12 bg-slate-100 rounded-lg overflow-hidden flex items-center justify-center text-xl">
            ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover">` : '📦'}
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-medium text-sm line-clamp-1">${p.name}</div>
            <div class="text-xs text-slate-500">${p.sku} · ${p.unit}</div>
          </div>
          <div class="flex items-center gap-1">
            <button onclick="changeQty(${p.id}, -1)" class="w-8 h-8 rounded-full bg-slate-100 font-bold">-</button>
            <span class="w-7 text-center font-bold text-sm">${qty}</span>
            <button onclick="changeQty(${p.id}, 1)" class="w-8 h-8 rounded-full bg-blue-600 text-white font-bold" ${qty >= p.current_stock ? 'disabled' : ''}>+</button>
          </div>
        </div>`).join('');
    }
    document.getElementById('cartTotalItems').textContent = `${count} รายการ · ${totalQty} ชิ้น`;
    document.getElementById('submitReqBtn').disabled = count === 0;
  }

  document.getElementById('cartBtn').addEventListener('click', () => {
    document.getElementById('cartSheet').classList.remove('hidden');
  });
  function closeCart() { document.getElementById('cartSheet').classList.add('hidden'); }

  // ====== SUBMIT REQUISITION ======
  document.getElementById('submitReqBtn').addEventListener('click', async () => {
    if (cart.size === 0) return;
    const purpose = document.getElementById('cartPurpose').value.trim();
    if (!confirmDialog(`ยืนยันส่งใบเบิก ${cart.size} รายการ?`)) return;

    const btn = document.getElementById('submitReqBtn');
    btn.disabled = true; btn.textContent = 'กำลังส่ง...';

    try {
      // 1) สร้าง requisition
      const { data: req, error: reqErr } = await supabase
        .from('requisitions')
        .insert({
          requested_by: me.id,
          department: me.department,
          purpose: purpose || null,
          total_items: cart.size,
        })
        .select()
        .single();
      if (reqErr) throw reqErr;

      // 2) เพิ่ม items
      const items = Array.from(cart.values()).map(({ product, qty }) => ({
        requisition_id: req.id,
        product_id: product.id,
        quantity_requested: qty,
        unit: product.unit,
      }));
      const { error: itemErr } = await supabase.from('requisition_items').insert(items);
      if (itemErr) throw itemErr;

      toast(`ส่งใบเบิก ${req.req_no} แล้ว รออนุมัติ`, 'success');
      cart.clear();
      refreshCart();
      renderProducts();
      document.getElementById('cartPurpose').value = '';
    } catch (e) {
      console.error(e);
      toast('เกิดข้อผิดพลาด: ' + (e.message || ''), 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'ส่งใบเบิก';
    }
  });

  // ====== HISTORY ======
  document.getElementById('historyBtn').addEventListener('click', async () => {
    document.getElementById('historySheet').classList.remove('hidden');
    const { data } = await supabase
      .from('requisitions')
      .select('id, req_no, status, purpose, created_at, approved_at, issued_at, requisition_items(quantity_requested, products(name, sku))')
      .eq('requested_by', me.id)
      .order('created_at', { ascending: false })
      .limit(50);
    renderHistory(data || []);
  });
  function closeHistory() { document.getElementById('historySheet').classList.add('hidden'); }

  const statusBadge = {
    pending:   { color: 'bg-amber-100 text-amber-700',  text: 'รออนุมัติ' },
    approved:  { color: 'bg-blue-100 text-blue-700',    text: 'อนุมัติแล้ว' },
    issued:    { color: 'bg-green-100 text-green-700',  text: 'จ่ายแล้ว' },
    rejected:  { color: 'bg-red-100 text-red-700',      text: 'ไม่อนุมัติ' },
    cancelled: { color: 'bg-slate-100 text-slate-600',  text: 'ยกเลิก' },
  };
  function renderHistory(list) {
    const el = document.getElementById('historyList');
    if (!list.length) {
      el.innerHTML = '<p class="text-center text-slate-500 py-8">ยังไม่มีประวัติการเบิก</p>';
      return;
    }
    el.innerHTML = list.map(r => {
      const sb = statusBadge[r.status] || { color: 'bg-slate-100', text: r.status };
      const items = (r.requisition_items || []).map(i => `${i.products?.name} × ${i.quantity_requested}`).join(', ');
      return `
        <div class="card p-3 fade-in">
          <div class="flex justify-between items-start mb-1">
            <div class="font-mono text-sm font-semibold">${r.req_no}</div>
            <span class="text-xs px-2 py-0.5 rounded-full ${sb.color}">${sb.text}</span>
          </div>
          <div class="text-xs text-slate-500 mb-1">${fmtDate(r.created_at)}</div>
          ${r.purpose ? `<div class="text-xs text-slate-600 mb-1">📝 ${r.purpose}</div>` : ''}
          <div class="text-xs text-slate-700 line-clamp-2">${items}</div>
        </div>`;
    }).join('');
  }

  // ====== SEARCH ======
  document.getElementById('searchInput').addEventListener('input', renderProducts);

  // ====== REALTIME: Update product stock ======
  supabase.channel('products-changes')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'products' }, (payload) => {
      const idx = products.findIndex(p => p.id === payload.new.id);
      if (idx >= 0) { products[idx] = { ...products[idx], ...payload.new }; renderProducts(); }
    })
    .subscribe();
  </script>
</body>
</html>
